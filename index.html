<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">

<title>발행된 글</title>
<style>:root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 2.5rem 1.25rem 5rem;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Pretendard, sans-serif;
    font-size: 1.0625rem;
    line-height: 1.7;
    color: #1a1a1a;
    background: #fff;
  }
  article { max-width: 42rem; margin: 0 auto; }
  h1 { font-size: 1.9rem; font-weight: 700; line-height: 1.3; margin: 0 0 0.5rem; }
  h2, h3, h4 { font-weight: 700; margin: 2rem 0 0.75rem; line-height: 1.35; }
  h2 { font-size: 1.4rem; }
  h3 { font-size: 1.15rem; }
  p { margin: 0 0 1rem; }
  a { color: #1a56db; text-decoration: underline; text-underline-offset: 2px; }
  code { font-family: ui-monospace, 'SF Mono', Menlo, monospace; font-size: 0.875em; background: #f1f1f3; padding: 0.15em 0.4em; border-radius: 4px; }
  pre { background: #f1f1f3; padding: 1rem; border-radius: 8px; overflow-x: auto; }
  pre code { background: none; padding: 0; }
  blockquote { margin: 1rem 0; padding: 0 0 0 1rem; border-left: 3px solid #d0d0d5; color: #555; }
  ul, ol { padding-left: 1.5rem; margin: 0 0 1rem; }
  li { margin: 0.25rem 0; }
  ul[data-type="taskList"] { list-style: none; padding-left: 0; }
  ul[data-type="taskList"] li { display: flex; align-items: flex-start; gap: 0.5rem; }
  ul[data-type="taskList"] input[type="checkbox"] { margin-top: 0.35rem; pointer-events: none; }
  table { border-collapse: collapse; width: 100%; margin: 1rem 0; font-size: 0.95em; }
  th, td { border: 1px solid #d0d0d5; padding: 0.5rem 0.75rem; text-align: left; }
  img { max-width: 100%; border-radius: 6px; }
  hr { border: none; border-top: 1px solid #e0e0e5; margin: 2rem 0; }
  .publish-meta { color: #888; font-size: 0.875rem; margin: 0 0 2rem; }
  .publish-footer { max-width: 42rem; margin: 3rem auto 0; padding-top: 1.5rem; border-top: 1px solid #e0e0e5; font-size: 0.8rem; color: #999; text-align: center; }
  .publish-footer a { color: inherit; }

  /* Deliberately last: @media doesn't grant precedence over other rules on its
     own, only conditional matching — at equal specificity, the *later* rule in
     the stylesheet always wins once its condition is met. Every dark-mode
     override above the plain selectors it's meant to override (code/pre/a/
     blockquote/table/hr all being declared further down, e.g.) was silently
     losing that tiebreak and never actually applying — this is why dark mode
     only "worked" for body (the one selector whose override happened to already
     sit after its own base rule) while code blocks rendered white-on-white.
     Keep this block last so every override in it wins for real. */
  @media (prefers-color-scheme: dark) {
    body { color: #e6e6e6; background: #16161a; }
    a { color: #8ab4f8; }
    code, pre { background: #232329; color: #e6e6e6; }
    pre code { background: none; color: inherit; }
    blockquote { border-left-color: #3a3a42; color: #a0a0a8; }
    table, th, td { border-color: #3a3a42; }
    hr { border-color: #3a3a42; }
  }
  .publish-index { list-style: none; padding: 0; margin: 0; }
  .publish-index li { display: flex; justify-content: space-between; gap: 1rem; padding: 0.6rem 0; border-bottom: 1px solid #e0e0e5; }
  .publish-index-date { color: #888; font-size: 0.875rem; white-space: nowrap; }
  @media (prefers-color-scheme: dark) {
    .publish-index li { border-bottom-color: #3a3a42; }
  }
</style>
</head>
